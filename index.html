<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Progress Bar 2026 - Lihat berapa persen tahun 2026 sudah berlalu. Visualisasi real-time perjalanan tahun ini.">
  <meta name="keywords" content="progress bar 2026, year progress, persentase tahun, tahun 2026">
  <meta name="author" content="Progress Bar 2026">
  <meta property="og:title" content="Progress Bar 2026 - Berapa persen tahun ini sudah berlalu?">
  <meta property="og:description" content="Visualisasi real-time perjalanan tahun 2026. Lihat sekarang!">
  <meta property="og:type" content="website">
  <title>Progress Bar 2026 — Berapa Persen Tahun Ini Sudah Berlalu?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <!-- GANTI 'ca-pub-XXXXXXXXXXXXXXXX' dengan Publisher ID AdSense Anda -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"
     crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Top Ad Banner -->
  <div class="ad-slot ad-top" id="ad-top">
    <!-- GANTI 'data-ad-client' dan 'data-ad-slot' DI BAWAH INI -->
    <ins class="adsbygoogle"
         style="display:inline-block;width:728px;height:90px"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="YYYYYYYYYY"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <div class="main-layout">
    <!-- Left Ad -->
    <aside class="ad-slot ad-side ad-left" id="ad-left">
      <!-- GANTI 'data-ad-client' dan 'data-ad-slot' DI BAWAH INI -->
      <ins class="adsbygoogle"
           style="display:inline-block;width:160px;height:600px"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
           data-ad-slot="YYYYYYYYYY"></ins>
      <script>
           (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </aside>

    <!-- Main Content -->
    <main class="content" id="main-content">
      <div class="hero-section">
        <div class="year-badge">
          <span class="hourglass" id="hourglass">⏳</span>
          <span class="year-text" id="year-text">2026</span>
        </div>

        <h1 class="headline" id="headline">
          <span class="year-num" id="headline-year">2026</span> is
          <span class="percent-highlight" id="percent-text">0%</span> complete.
        </h1>

        <p class="sub-text" id="sub-text">Loading...</p>

        <!-- Progress Bar -->
        <div class="progress-container" id="progress-container">
          <div class="progress-outer">
            <div class="progress-track">
              <div class="progress-fill" id="progress-fill">
                <div class="progress-glow"></div>
                <div class="progress-shine"></div>
              </div>
              <div class="progress-particles" id="progress-particles"></div>
            </div>
          </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card" id="stat-days-passed">
            <div class="stat-value" id="days-passed">0</div>
            <div class="stat-label">Hari Berlalu</div>
          </div>
          <div class="stat-card" id="stat-days-remaining">
            <div class="stat-value" id="days-remaining">0</div>
            <div class="stat-label">Hari Tersisa</div>
          </div>
          <div class="stat-card" id="stat-current-day">
            <div class="stat-value" id="current-day">0</div>
            <div class="stat-label">Hari ke-</div>
          </div>
          <div class="stat-card" id="stat-total-days">
            <div class="stat-value" id="total-days">0</div>
            <div class="stat-label">Total Hari</div>
          </div>
        </div>

        <!-- Date Info -->
        <div class="date-info" id="date-info">
          <div class="date-display" id="date-display">
            <span class="date-icon">📅</span>
            <span id="current-date-text">Loading...</span>
          </div>
          <div class="time-display" id="time-display">
            <span class="time-icon">🕐</span>
            <span id="current-time-text">Loading...</span>
          </div>
        </div>

        <!-- Fun Fact -->
        <div class="fun-fact" id="fun-fact">
          <div class="fun-fact-icon">💡</div>
          <p class="fun-fact-text" id="fun-fact-text"></p>
        </div>
      </div>

      <footer class="footer" id="footer">
        <p>Dibuat dengan ❤️ — Auto-update setiap detik</p>
        <p class="footer-note">Inspired by <a href="https://twitter.com/ProgressBar202_" target="_blank"
            rel="noopener">@ProgressBar202_</a></p>
      </footer>
    </main>

    <!-- Right Ad -->
    <aside class="ad-slot ad-side ad-right" id="ad-right">
      <!-- GANTI 'data-ad-client' dan 'data-ad-slot' DI BAWAH INI -->
      <ins class="adsbygoogle"
           style="display:inline-block;width:160px;height:600px"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
           data-ad-slot="YYYYYYYYYY"></ins>
      <script>
           (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </aside>
  </div>

  <!-- Bottom Ad Banner -->
  <div class="ad-slot ad-bottom" id="ad-bottom">
    <!-- GANTI 'data-ad-client' dan 'data-ad-slot' DI BAWAH INI -->
    <ins class="adsbygoogle"
         style="display:inline-block;width:728px;height:90px"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="YYYYYYYYYY"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <script src="script.js"></script>
</body>

</html>
